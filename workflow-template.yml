name: Download from HuggingFace

on:
  workflow_dispatch:
    inputs:
      hf_urls:
        description: 'HuggingFace file URLs (comma-separated)'
        required: true
      filenames:
        description: 'Output filenames (comma-separated, matching URLs)'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download files
        run: |
          IFS=',' read -ra URLS <<< "${{ github.event.inputs.hf_urls }}"
          IFS=',' read -ra NAMES <<< "${{ github.event.inputs.filenames }}"
          for i in "${!URLS[@]}"; do
            echo "Downloading ${URLS[$i]} -> ${NAMES[$i]}"
            wget -q --show-progress -O "${NAMES[$i]}" "${URLS[$i]}"
            ls -lh "${NAMES[$i]}"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "hf-files-${{ github.run_number }}"
          files: |
            ${{ github.event.inputs.filenames }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
