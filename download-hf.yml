name: Download from HuggingFace

on:
  workflow_dispatch:
    inputs:
      hf_repo:
        description: 'HuggingFace repo (e.g., DeepBeepMeep/Wan2.1)'
        required: true
      hf_file:
        description: 'File path in repo (e.g., wan2.1_infinitetalk_multi_14B_quanto_mbf16_int8.safetensors)'
        required: true
      release_tag:
        description: 'Release tag (e.g., infinitetalk-multi)'
        required: true
      chunk_size:
        description: 'Split chunk size in MB (default: 1900 for <2GB limit)'
        required: false
        default: '1900'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download from HuggingFace
        env:
          HF_REPO: ${{ github.event.inputs.hf_repo }}
          HF_FILE: ${{ github.event.inputs.hf_file }}
        run: |
          echo "Downloading ${HF_FILE} from ${HF_REPO}..."
          URL="https://huggingface.co/${HF_REPO}/resolve/main/${HF_FILE}"
          wget -q --show-progress -O "download.bin" "${URL}" || curl -L -o "download.bin" "${URL}"
          ls -lh download.bin
          md5sum download.bin > download.md5
          echo "Download complete"
      
      - name: Split if needed
        env:
          CHUNK_SIZE: ${{ github.event.inputs.chunk_size }}
        run: |
          FILE_SIZE=$(stat -f%z download.bin 2>/dev/null || stat -c%s download.bin)
          FILE_SIZE_MB=$((FILE_SIZE / 1024 / 1024))
          echo "File size: ${FILE_SIZE_MB}MB"
          
          if [ "$FILE_SIZE_MB" -gt "$CHUNK_SIZE" ]; then
            echo "File exceeds ${CHUNK_SIZE}MB, splitting..."
            split -b "${CHUNK_SIZE}M" download.bin chunk_
            ls -lh chunk_*
            echo "SPLIT=true" >> $GITHUB_ENV
          else
            echo "File within size limit, no split needed"
            echo "SPLIT=false" >> $GITHUB_ENV
          fi
      
      - name: Create Release and Upload
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create release
          gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes "HuggingFace relay download" || true
          
          if [ "$SPLIT" = "true" ]; then
            # Upload chunks
            for chunk in chunk_*; do
              echo "Uploading ${chunk}..."
              gh release upload "${RELEASE_TAG}" "${chunk}" --clobber
            done
          else
            # Upload single file
            echo "Uploading download.bin..."
            gh release upload "${RELEASE_TAG}" download.bin --clobber
          fi
          
          # Upload md5
          gh release upload "${RELEASE_TAG}" download.md5 --clobber
          
          echo "✅ Upload complete"
