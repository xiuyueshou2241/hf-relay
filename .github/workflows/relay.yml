name: HF Relay Download

on:
  workflow_dispatch:
    inputs:
      hf_repo:
        description: 'HuggingFace repo (e.g., DeepBeepMeep/Wan2.1)'
        required: true
        type: string
      hf_file:
        description: 'File path in repo (e.g., text_encoders/clip_l.safetensors). Comma-separated for multiple.'
        required: true
        type: string
      release_tag:
        description: 'Release tag (e.g., infinitetalk-multi)'
        required: true
        type: string
      hf_branch:
        description: 'Branch/ref (default: main)'
        required: false
        default: 'main'
        type: string
      chunk_size:
        description: 'Split chunk size in MB (default: 1900)'
        required: false
        default: '1900'
        type: string
  repository_dispatch:
    types: [hf-relay]

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Parse inputs
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "HF_REPO=${{ github.event.client_payload.hf_repo }}" >> $GITHUB_ENV
            echo "HF_FILE=${{ github.event.client_payload.hf_file }}" >> $GITHUB_ENV
            echo "RELEASE_TAG=${{ github.event.client_payload.release_tag }}" >> $GITHUB_ENV
            echo "HF_BRANCH=${{ github.event.client_payload.hf_branch || 'main' }}" >> $GITHUB_ENV
            echo "CHUNK_SIZE=${{ github.event.client_payload.chunk_size || '1900' }}" >> $GITHUB_ENV
          else
            echo "HF_REPO=${{ github.event.inputs.hf_repo }}" >> $GITHUB_ENV
            echo "HF_FILE=${{ github.event.inputs.hf_file }}" >> $GITHUB_ENV
            echo "RELEASE_TAG=${{ github.event.inputs.release_tag }}" >> $GITHUB_ENV
            echo "HF_BRANCH=${{ github.event.inputs.hf_branch }}" >> $GITHUB_ENV
            echo "CHUNK_SIZE=${{ github.event.inputs.chunk_size }}" >> $GITHUB_ENV
          fi
          echo "📦 Repo: $HF_REPO | File: $HF_FILE | Tag: $RELEASE_TAG | Branch: $HF_BRANCH"

      - name: Download from HuggingFace
        run: |
          IFS=',' read -ra FILES <<< "$HF_FILE"
          for file in "${FILES[@]}"; do
            file=$(echo "$file" | xargs)
            filename=$(basename "$file")
            URL="https://huggingface.co/${HF_REPO}/resolve/${HF_BRANCH}/${file}"
            echo "⬇️ Downloading ${filename} from ${HF_REPO}..."
            echo "   URL: ${URL}"
            
            # Use curl with follow redirects and proper LFS support
            curl -L --retry 3 --retry-delay 5 --max-time 1800 \
              -H "Accept: application/octet-stream" \
              -o "${filename}" "${URL}"
            
            if [ ! -f "${filename}" ] || [ ! -s "${filename}" ]; then
              echo "❌ Failed to download ${filename}"
              exit 1
            fi
            
            ACTUAL_SIZE=$(stat -c%s "${filename}")
            echo "   Size: ${ACTUAL_SIZE} bytes"
            
            # Verify it's not an HTML error page (HF returns HTML for 404/403)
            if file "${filename}" | grep -q "HTML"; then
              echo "❌ Downloaded HTML instead of binary - URL may be wrong"
              head -5 "${filename}"
              exit 1
            fi
            
            md5sum "${filename}" > "${filename}.md5"
            echo "✅ ${filename} downloaded successfully"
          done

      - name: Split large files
        run: |
          for file in *.safetensors *.bin *.pt *.pth *.gguf *.onnx *.ckpt; do
            [ -f "$file" ] || continue
            FILE_SIZE=$(stat -c%s "$file" 2>/dev/null || echo 0)
            FILE_SIZE_MB=$((FILE_SIZE / 1024 / 1024))
            
            if [ "$FILE_SIZE_MB" -gt "$CHUNK_SIZE" ]; then
              echo "✂️ ${file} (${FILE_SIZE_MB}MB) exceeds ${CHUNK_SIZE}MB, splitting..."
              split -b "${CHUNK_SIZE}M" "$file" "${file}.part_"
              rm "$file"
            else
              echo "📦 ${file} (${FILE_SIZE_MB}MB) within size limit"
            fi
          done

      - name: Create Release and Upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${RELEASE_TAG}" \
            --title "HF: ${HF_REPO}" \
            --notes "Auto-relayed from HuggingFace

          - **Repo**: ${HF_REPO}
          - **File**: ${HF_FILE}
          - **Branch**: ${HF_BRANCH}
          - **Date**: $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          
          for f in *.safetensors *.bin *.pt *.pth *.gguf *.onnx *.ckpt *.md5 *.part_*; do
            [ -f "$f" ] || continue
            echo "⬆️ Uploading ${f}..."
            gh release upload "${RELEASE_TAG}" "$f" --clobber
          done
          
          echo "✅ Release ${RELEASE_TAG} ready!"
